<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">s3-rs logo</title>
  <desc id="desc">Minimal s3-rs logo with light and dark theme adaptation.</desc>

  <style>
    :root {
      color-scheme: light dark;
      --brand-a: #0ea5e9;
      --brand-b: #2563eb;
      --text-main: #0f172a;
      --text-sub: #475569;
      --icon-fill: #ffffff;
      --icon-stroke: #334155;
      --surface-stroke: #dbe2ea;
      --surface-bg: #f8fafc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-main: #e2e8f0;
        --text-sub: #94a3b8;
        --icon-fill: #0f172a;
        --icon-stroke: #94a3b8;
        --surface-stroke: #2b3a4f;
        --surface-bg: #0b1220;
      }
    }
  </style>

  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="var(--brand-a)" />
      <stop offset="1" stop-color="var(--brand-b)" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect x="24" y="24" width="1152" height="232" rx="24" fill="var(--surface-bg)" stroke="var(--surface-stroke)" />

  <g transform="translate(94 68)" filter="url(#softShadow)">
    <circle cx="74" cy="74" r="62" fill="var(--icon-fill)" />
    <circle cx="74" cy="74" r="62" stroke="url(#ring)" stroke-width="12" />

    <ellipse cx="74" cy="59" rx="36" ry="12" fill="#38bdf8" />
    <path d="M38 59V104C38 116 54 126 74 126C94 126 110 116 110 104V59" fill="#111c2d" />
    <path d="M38 59V104C38 116 54 126 74 126C94 126 110 116 110 104V59" stroke="var(--icon-stroke)" stroke-width="3" />
    <path d="M46 86C54 82 64 80 74 80C84 80 94 82 102 86" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" />
  </g>

  <text x="300" y="126" fill="var(--text-main)" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="1">
    s3-rs
  </text>
  <text x="304" y="172" fill="var(--text-sub)" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="500">
    Lean, modern, unofficial S3-compatible client for Rust.
  </text>
</svg>
